<svg width="420" height="260" viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B8457"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="ringB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <clipPath id="logoClip">
      <circle cx="210" cy="130" r="62"/>
    </clipPath>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="404" height="244" rx="20" fill="#081C15" opacity="0.06"/>

  <g transform="translate(210 130)">
    <circle r="92" stroke="url(#ringA)" stroke-width="3" stroke-dasharray="10 7" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle r="80" stroke="url(#ringB)" stroke-width="2.5" stroke-dasharray="6 8" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="210" cy="130" r="64" fill="#FFFFFF" opacity="0.96"/>
  <circle cx="210" cy="130" r="54" fill="#0B8457" opacity="0.10"/>
  <text x="210" y="138" text-anchor="middle" font-size="34" font-family="Verdana, Arial, sans-serif" font-weight="700" fill="#0B8457">AD</text>

  <g fill="#0B8457" opacity="0.85">
    <circle cx="130" cy="76" r="4">
      <animate attributeName="cy" values="76;70;76" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="295" cy="188" r="3.5">
      <animate attributeName="cy" values="188;194;188" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="303" cy="80" r="3">
      <animate attributeName="cy" values="80;74;80" dur="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
